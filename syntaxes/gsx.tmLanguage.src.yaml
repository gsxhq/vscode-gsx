# Coarse TextMate grammar for gsx. AUTHORED here; gsx.tmLanguage.json is generated
# (npm run gen:grammar). Philosophy: color structure, delegate embedded Go/JS/CSS,
# lean on the gsx LSP for semantic accuracy. Keep coarse — do NOT reimplement
# tree-sitter-gsx. Component bodies are matched against canonical (gsx fmt) layout:
# the opening `{` ends the signature line, the closing `}` sits alone on a line.
scopeName: source.gsx
name: gsx
patterns:
  - include: '#comments'
  - include: '#component'
  - include: source.go
# Go holes (@{ … }) must win over the embedded JS/CSS grammars even when nested.
# Inside a js`…`/css`…` literal (or <script>/<style> body) the hole rule is only
# listed at the literal's top level, so as soon as source.js/source.css opens its
# own begin/end context — a JS object `{…}`, an arrow body, a CSS block — the hole
# rule falls out of scope. The JS grammar then eats `@{` as a decorator and, worse,
# reads the literal's closing backtick as the start of a JS template string, so the
# rest of the file is swallowed as JavaScript. An L:-priority injection re-applies
# the hole rule at ANY depth within those embedded scopes, consuming `@{ … }` before
# the host grammar can see the `@`.
injections:
  'L:meta.embedded.block.js.gsx, L:meta.embedded.block.css.gsx':
    patterns:
      - include: '#embedded-go-hole'
repository:
  comments:
    patterns:
      - name: comment.line.double-slash.gsx
        match: '//.*$'
      - name: comment.block.gsx
        begin: '/\*'
        end: '\*/'
      - name: comment.block.html.gsx
        begin: '<!--'
        end: '-->'
  component:
    name: meta.component.gsx
    begin: '^(component)\s+(?:\(([^)]*)\)\s+)?([A-Za-z_][A-Za-z0-9_]*)(\[[^\]]*\])?\s*\(([^{]*)\)\s*(\{)\s*$'
    beginCaptures:
      '1': { name: keyword.control.component.gsx }
      '2': { name: meta.embedded.line.go.gsx, patterns: [{ include: source.go }] }
      '3': { name: entity.name.function.gsx }
      '4': { name: meta.embedded.line.go.gsx, patterns: [{ include: source.go }] }
      '5': { name: meta.embedded.line.go.gsx, patterns: [{ include: source.go }] }
      '6': { name: punctuation.section.block.begin.gsx }
    end: '^(\})\s*$'
    endCaptures:
      '1': { name: punctuation.section.block.end.gsx }
    patterns:
      - include: '#markup'
  markup:
    patterns:
      - include: '#comments'
      - include: '#go-block'
      - include: '#script-element'
      - include: '#style-element'
      - include: '#doctype'
      - include: '#fragment'
      - include: '#component-tag'
      - include: '#element-tag'
      - include: '#interp'
  go-block:
    name: meta.embedded.block.go.gsx
    begin: '\{\{'
    beginCaptures: { '0': { name: punctuation.section.embedded.begin.gsx } }
    end: '\}\}'
    endCaptures: { '0': { name: punctuation.section.embedded.end.gsx } }
    contentName: source.go
    patterns: [{ include: source.go }]
  interp:
    name: meta.embedded.block.go.gsx
    begin: '(@?\{)'
    beginCaptures: { '0': { name: punctuation.section.embedded.begin.gsx } }
    end: '\}'
    endCaptures: { '0': { name: punctuation.section.embedded.end.gsx } }
    contentName: source.go
    patterns:
      - include: '#embedded-js-literal'
      - include: '#embedded-css-literal'
      - include: source.go
  doctype:
    name: meta.tag.doctype.gsx
    match: '(?i)(<!)(DOCTYPE)([^>]*)(>)'
    captures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: keyword.other.doctype.gsx }
      '4': { name: punctuation.definition.tag.gsx }
  fragment:
    name: meta.tag.fragment.gsx
    match: '(</?>)'
    captures: { '1': { name: punctuation.definition.tag.gsx } }
  component-tag:
    # Uppercase-initial (Card) or dotted (ui.Button, nav.Link) → component.
    name: meta.tag.component.gsx
    begin: '(</?)((?:[a-z][a-zA-Z0-9]*\.)?[A-Z][A-Za-z0-9.]*)(\[[^\]]+\])?'
    beginCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.type.component.gsx }
      '3': { name: meta.embedded.line.go.gsx, patterns: [{ include: source.go }] }
    end: '(/?>)'
    endCaptures: { '1': { name: punctuation.definition.tag.gsx } }
    patterns: [{ include: '#attribute' }]
  element-tag:
    # Lowercase/hyphenated → native element.
    name: meta.tag.element.gsx
    begin: '(</?)([a-z][a-z0-9-]*)'
    beginCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.tag.gsx }
    end: '(/?>)'
    endCaptures: { '1': { name: punctuation.definition.tag.gsx } }
    patterns: [{ include: '#attribute' }]
  attribute:
    patterns:
      # Source-only comments between attributes: bare // and /* */. Braced
      # {/* */} / {// } are handled by #interp (embedded source.go). Comments
      # first so a `//` in tag-interior position never falls through to text.
      - include: '#comments'
      - include: '#go-block'
      - include: '#embedded-js-attribute'
      - include: '#embedded-css-attribute'
      # class={…}/style={…}: embed source.go so value-form if/switch/case/default/else
      # highlight as Go keywords. Two separate rules (no alternation) so {capture 2}
      # is always the opening brace. Must come before #interp to take priority.
      - name: meta.attribute.class-value.gsx
        begin: '(class)\s*=\s*(\{)'
        beginCaptures:
          '1': { name: entity.other.attribute-name.class.gsx }
          '2': { name: punctuation.section.embedded.begin.gsx }
        end: '\}'
        endCaptures: { '0': { name: punctuation.section.embedded.end.gsx } }
        contentName: meta.embedded.block.go.gsx
        patterns: [{ include: source.go }]
      - name: meta.attribute.style-value.gsx
        begin: '(style)\s*=\s*(\{)'
        beginCaptures:
          '1': { name: entity.other.attribute-name.gsx }
          '2': { name: punctuation.section.embedded.begin.gsx }
        end: '\}'
        endCaptures: { '0': { name: punctuation.section.embedded.end.gsx } }
        contentName: meta.embedded.block.go.gsx
        patterns:
          - include: '#embedded-css-literal'
          - include: source.go
      - include: '#interp'
      - name: string.quoted.double.gsx
        begin: '"'
        end: '"'
      - name: keyword.operator.assignment.gsx
        match: '='
      - name: entity.other.attribute-name.gsx
        match: '[A-Za-z_@:][A-Za-z0-9_.:-]*'
  embedded-go-hole:
    name: meta.embedded.block.go.gsx
    begin: '@\{'
    beginCaptures: { '0': { name: punctuation.section.embedded.begin.gsx } }
    end: '\}'
    endCaptures: { '0': { name: punctuation.section.embedded.end.gsx } }
    contentName: source.go
    patterns: [{ include: source.go }]
  embedded-js-literal:
    name: meta.embedded.block.js.gsx
    begin: '(js)(`)'
    beginCaptures:
      '1': { name: support.type.embedded-language.gsx }
      '2': { name: punctuation.definition.string.begin.gsx }
    end: '(?<!\\)(?:\\\\)*\K`'
    endCaptures: { '0': { name: punctuation.definition.string.end.gsx } }
    contentName: source.js
    patterns:
      - include: '#embedded-go-hole'
      - include: source.js
  embedded-css-literal:
    name: meta.embedded.block.css.gsx
    begin: '(css)(`)'
    beginCaptures:
      '1': { name: support.type.embedded-language.gsx }
      '2': { name: punctuation.definition.string.begin.gsx }
    end: '(?<!\\)(?:\\\\)*\K`'
    endCaptures: { '0': { name: punctuation.definition.string.end.gsx } }
    contentName: source.css
    patterns:
      - include: '#embedded-go-hole'
      - include: source.css
  embedded-js-attribute:
    name: meta.embedded.block.js.gsx
    begin: '([A-Za-z_@:][A-Za-z0-9_.:-]*)(\s*=\s*)(\{?)(js)(`)'
    beginCaptures:
      '1': { name: entity.other.attribute-name.gsx }
      '2': { name: keyword.operator.assignment.gsx }
      '3': { name: punctuation.section.embedded.begin.gsx }
      '4': { name: support.type.embedded-language.gsx }
      '5': { name: punctuation.definition.string.begin.gsx }
    end: '((?<!\\)(?:\\\\)*\K`)(\})?'
    endCaptures:
      '1': { name: punctuation.definition.string.end.gsx }
      '2': { name: punctuation.section.embedded.end.gsx }
    contentName: source.js
    patterns:
      - include: '#embedded-go-hole'
      - include: source.js
  embedded-css-attribute:
    name: meta.embedded.block.css.gsx
    begin: '([A-Za-z_@:][A-Za-z0-9_.:-]*)(\s*=\s*)(\{?)(css)(`)'
    beginCaptures:
      '1': { name: entity.other.attribute-name.gsx }
      '2': { name: keyword.operator.assignment.gsx }
      '3': { name: punctuation.section.embedded.begin.gsx }
      '4': { name: support.type.embedded-language.gsx }
      '5': { name: punctuation.definition.string.begin.gsx }
    end: '((?<!\\)(?:\\\\)*\K`)(\})?'
    endCaptures:
      '1': { name: punctuation.definition.string.end.gsx }
      '2': { name: punctuation.section.embedded.end.gsx }
    contentName: source.css
    patterns:
      - include: '#embedded-go-hole'
      - include: source.css
  script-element:
    begin: '(<)(script)\b([^>]*)(>)'
    beginCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.tag.gsx }
      '4': { name: punctuation.definition.tag.gsx }
    end: '(</)(script)\s*(>)'
    endCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.tag.gsx }
      '3': { name: punctuation.definition.tag.gsx }
    contentName: meta.embedded.block.js.gsx
    patterns: [{ include: source.js }]
  style-element:
    begin: '(<)(style)\b([^>]*)(>)'
    beginCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.tag.gsx }
      '4': { name: punctuation.definition.tag.gsx }
    end: '(</)(style)\s*(>)'
    endCaptures:
      '1': { name: punctuation.definition.tag.gsx }
      '2': { name: entity.name.tag.gsx }
      '3': { name: punctuation.definition.tag.gsx }
    contentName: meta.embedded.block.css.gsx
    patterns: [{ include: source.css }]
